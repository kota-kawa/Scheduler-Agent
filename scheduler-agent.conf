 # www ありを www なしにリダイレクト
    2 server {
    3     listen 80;
    4     server_name www.scheduler-agent.project-kk.com;
    5     return 301 $scheme://scheduler-agent.project-kk.com$request_uri;
    6 }
    7
    8 server {
    9     listen 80;
   10     server_name scheduler-agent.project-kk.com;
   11
   12     # ログ設定
   13     access_log /var/log/nginx/scheduler_agent_access.log;
   14     error_log /var/log/nginx/scheduler_agent_error.log;
   15
   16     # タイムアウト設定 (LLMの応答待ちに対応)
   17     proxy_read_timeout 300;
   18     proxy_connect_timeout 300;
   19     proxy_send_timeout 300;
   20
   21     # クライアントボディサイズの制限 (必要に応じて調整)
   22     client_max_body_size 10M;
   23
   24     location / {
   25         # Docker のポート 5010 へ転送
   26         proxy_pass http://localhost:5010;
   27         proxy_http_version 1.1;
   28
   29         # ホスト情報をバックエンドに正しく伝える
   30         proxy_set_header Host $host;
   31         proxy_set_header X-Real-IP $remote_addr;
   32         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
   33         proxy_set_header X-Forwarded-Proto $scheme;
   34
   35         # WebSocket / SSE (MCP用) のサポート
   36         proxy_set_header Upgrade $http_upgrade;
   37         proxy_set_header Connection "upgrade";
   38
   39         # バッファリングを無効化 (LLMのストリーミング応答をスムーズにするため)
   40         proxy_buffering off;
   41         proxy_cache off;
   42     }
   43
   44     # セキュリティ: .git などの隠しファイルへのアクセスを禁止
   45     location ~ /\. {
   46         deny all;
   47     }
   48 }
