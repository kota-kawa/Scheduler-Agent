# www ありを www なしにリダイレクト
server {
    server_name www.scheduler-agent.project-kk.com;
    return 301 $scheme://scheduler-agent.project-kk.com$request_uri;

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/scheduler-agent.project-kk.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/scheduler-agent.project-kk.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    server_name scheduler-agent.project-kk.com;

    # ログ設定
    access_log /var/log/nginx/scheduler_agent_access.log;
    error_log /var/log/nginx/scheduler_agent_error.log;

    # タイムアウト設定 (LLMの応答待ちに対応)
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # クライアントボディサイズの制限 (必要に応じて調整)
    client_max_body_size 10M;

    location / {
        # Docker のポート 5010 へ転送
        proxy_pass http://127.0.0.1:5010;
        proxy_http_version 1.1;

        # ホスト情報をバックエンドに正しく伝える
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE (MCP用) のサポート
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # バッファリングを無効化 (LLMのストリーミング応答をスムーズにするため)
        proxy_buffering off;
        proxy_cache off;
    }

    # セキュリティ: .git などの隠しファイルへのアクセスを禁止
    location ~ /\. {
        deny all;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/scheduler-agent.project-kk.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/scheduler-agent.project-kk.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = scheduler-agent.project-kk.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name scheduler-agent.project-kk.com;
    return 404; # managed by Certbot


}
server {
    if ($host = www.scheduler-agent.project-kk.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name www.scheduler-agent.project-kk.com;
    return 404; # managed by Certbot


}