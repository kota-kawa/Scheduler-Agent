name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scheduler-agent-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast:
    name: Fast Tests
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-test-secret
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@localhost:5432/scheduler_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov

      - name: Run fast tests
        run: |
          mkdir -p reports
          pytest -q \
            tests/test_architecture_imports.py \
            tests/test_ci_smoke.py \
            tests/test_ci_handlers_unit.py \
            tests/test_ci_model_selection_helpers.py \
            tests/test_ci_llm_client_helpers.py \
            tests/test_ci_config_and_templates.py \
            --junitxml=reports/fast-junit.xml

      - name: Upload fast junit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-junit
          path: reports/fast-junit.xml

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  postgres-integration:
    name: Postgres Integration + Coverage
    runs-on: ubuntu-latest
    needs:
      - fast
      - frontend-build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: scheduler_test
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U scheduler -d scheduler_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      SESSION_SECRET: ci-test-secret
      TEST_DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@localhost:5432/scheduler_test
      DATABASE_URL: postgresql+psycopg2://scheduler:scheduler@localhost:5432/scheduler_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-cov

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import os
          import time
          from urllib.parse import unquote, urlparse

          import psycopg2

          database_url = os.environ.get("TEST_DATABASE_URL") or os.environ.get("DATABASE_URL")
          if not database_url:
              raise SystemExit("TEST_DATABASE_URL or DATABASE_URL is required.")

          parsed = urlparse(database_url)
          if not parsed.scheme.startswith("postgresql"):
              raise SystemExit(f"Unsupported database URL scheme for PostgreSQL wait: {parsed.scheme}")

          connect_kwargs = {
              "host": parsed.hostname or "localhost",
              "port": parsed.port or 5432,
              "dbname": (parsed.path or "/").lstrip("/") or "postgres",
          }
          if parsed.username:
              connect_kwargs["user"] = unquote(parsed.username)
          if parsed.password:
              connect_kwargs["password"] = unquote(parsed.password)

          target = f"{connect_kwargs['host']}:{connect_kwargs['port']}/{connect_kwargs['dbname']}"
          last_error = None

          for _ in range(30):
              try:
                  conn = psycopg2.connect(**connect_kwargs)
                  conn.close()
                  print(f"PostgreSQL is ready: {target}")
                  raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(2)

          raise SystemExit(f"PostgreSQL did not become ready in time ({target}): {last_error}")
          PY

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          pytest -q \
            --junitxml=reports/junit.xml \
            --cov=scheduler_agent \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml \
            tests/test_architecture_imports.py \
            tests/test_ci_smoke.py \
            tests/test_ci_postgres_smoke.py

      - name: Fail if tests were skipped
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import xml.etree.ElementTree as ET

          report_path = Path("reports/junit.xml")
          if not report_path.exists():
            print("reports/junit.xml was not generated. Skip-count check is skipped.")
            raise SystemExit(0)

          tree = ET.parse(report_path)
          root = tree.getroot()
          skipped = 0
          for suite in root.iter("testsuite"):
            skipped += int(suite.attrib.get("skipped", "0"))

          if skipped > 0:
            print(f"Found skipped tests: {skipped}")
            sys.exit(1)

          print("No skipped tests detected.")
          PY

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-reports
          path: reports

  deploy:
    name: Deploy (main push)
    runs-on: ubuntu-latest
    needs:
      - fast
      - frontend-build
      - postgres-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    env:
      DEPLOY_BRANCH: "main"
      DEPLOY_PATH: ${{ secrets.DEPLAY_PATH || secrets.DEPLOY_PATH || '/var/www/scheduler-agent' }}
    steps:
      - name: Check deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in SERVER_HOST SERVER_USER SERVER_SSH_KEY; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Required GitHub secrets are missing: ${missing[*]}"
            exit 1
          fi

      - name: Configure SSH key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SERVER_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          port="${SERVER_PORT:-22}"
          ssh-keyscan -p "${port}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLAY_PATH || secrets.DEPLOY_PATH || '/var/www/scheduler-agent' }}
          DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH }}
        run: |
          set -euo pipefail
          port="${SERVER_PORT:-22}"
          ssh -i ~/.ssh/id_rsa -o BatchMode=yes -o StrictHostKeyChecking=accept-new -p "${port}" "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' bash -seu" <<'REMOTE_SCRIPT'
          set -euo pipefail

          cd "${DEPLOY_PATH}"

          if [ ! -d .git ]; then
            echo "Deployment path is not a git checkout: ${DEPLOY_PATH}" >&2
            exit 1
          fi

          if [ ! -f secrets.env ]; then
            echo "secrets.env is missing at ${DEPLOY_PATH}. Create it on the server before deploying." >&2
            exit 1
          fi

          PREV_COMMIT="$(git rev-parse HEAD)"

          compose_up() {
            docker compose up -d --build
          }

          diagnose() {
            echo "Deployment diagnostics"
            docker compose ps || true
            docker compose logs web db --tail=200 || true
          }

          rollback() {
            echo "Deploy failed. Rolling back to ${PREV_COMMIT}"
            git reset --hard "${PREV_COMMIT}"
            compose_up || true
          }

          on_error() {
            trap - ERR
            diagnose
            rollback
          }

          wait_for_service() {
            service="$1"
            retries="${2:-45}"
            while [ "${retries}" -gt 0 ]; do
              cid="$(docker compose ps -q "${service}")"
              if [ -z "${cid}" ]; then
                echo "Service ${service} container is missing." >&2
                return 1
              fi

              status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${cid}")"
              if [ "${status}" = "healthy" ] || [ "${status}" = "running" ]; then
                echo "Service ${service} is ${status}"
                return 0
              fi
              if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ] || [ "${status}" = "dead" ]; then
                echo "Service ${service} is ${status}" >&2
                return 1
              fi

              sleep 2
              retries=$((retries - 1))
            done

            echo "Timed out waiting for service ${service} to become ready." >&2
            return 1
          }

          probe_web() {
            docker compose exec -T web python -c "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://127.0.0.1:5010/').status == 200 else 1)"
          }

          trap on_error ERR

          git config --global --add safe.directory "${DEPLOY_PATH}"
          git fetch origin "${DEPLOY_BRANCH}"
          git reset --hard "origin/${DEPLOY_BRANCH}"

          compose_up

          docker compose ps
          for service in db web; do
            wait_for_service "${service}" 45
          done

          retries=30
          while [ "${retries}" -gt 0 ]; do
            if probe_web; then
              echo "Web probe passed."
              break
            fi
            sleep 2
            retries=$((retries - 1))
          done

          if [ "${retries}" -eq 0 ]; then
            echo "HTTP probe failed." >&2
            exit 1
          fi

          trap - ERR
          docker image prune -f || true
          REMOTE_SCRIPT
